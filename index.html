<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.R. CARPENTER TRADING SARL - CONAKRY | Shipment Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Times+New+Roman:wght@400;700&display=swap');
        
        body {
            font-family: 'Times New Roman', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #3b82f6 100%);
            padding: 30px;
            min-height: 100vh;
        }
        
        .form-container {
            max-width: 1160px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border: 5px solid #1e40af;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            min-height: 920px;
        }
        
        .header {
            text-align: center;
            padding: 35px 20px 30px;
            background: linear-gradient(to right, #1e40af, #2563eb);
            color: white;
        }
        
        .paper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            padding: 40px 50px;
        }
        
        th, td {
            border: 1px solid #1e40af;
            padding: 12px 8px;
            text-align: center;
            font-size: 16px;
        }
        
        th {
            background-color: #dbeafe;
            color: #1e40af;
            font-weight: bold;
        }
        
        .input-field {
            width: 100%;
            padding: 14px 12px;
            border: 2px solid #1e40af;
            font-size: 16.5px;
            text-align: center;
            border-radius: 4px;
            height: 54px;
            box-sizing: border-box;
        }
        
        .label {
            display: block;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .right-panel {
            border-left: 4px solid #1e40af;
            padding-left: 60px;
        }
        
        .field-group {
            margin-bottom: 26px;
        }
        
        .signature-area {
            position: absolute;
            bottom: 150px;
            right: 75px;
            width: 390px;
            padding: 20px;
            border: 2px solid #1e40af;
            background: #f8fafc;
        }
        
        .signature-canvas {
            border: 2px dashed #1e40af;
            width: 100%;
            height: 140px;
            background: #fff;
            margin-top: 10px;
        }
        
        .total-row {
            background-color: #dbeafe;
            font-weight: bold;
            color: #1e40af;
        }
        
        .download-hidden { display: block; }
    </style>
</head>
<body>

    <div class="form-container mx-auto" style="width: 1160px;" id="form-content">
        <div class="header">
            <h1 class="text-3xl font-bold">W.R. CARPENTER TRADING SARL - CONAKRY</h1>
            <h2 class="text-2xl mt-2 tracking-wider">SHIPMENT LOADING</h2>
        </div>

        <div class="paper">
            <!-- Left Side -->
            <div>
                <div class="flex gap-8 mb-8 items-end">
                    <div class="field-group">
                        <label class="label">DATE</label>
                        <input type="date" id="date" class="input-field w-64">
                    </div>
                    <div class="flex-1 field-group">
                        <label class="label">CUSTOMER</label>
                        <input type="text" id="customer" class="input-field" placeholder="Enter Customer Name">
                    </div>
                </div>

                <table id="weighing-table" class="w-full">
                    <thead>
                        <tr>
                            <th class="w-16">SET</th>
                            <th class="w-28">NO OF BAGS</th>
                            <th class="w-32">WEIGHT KGS</th>
                            <th class="w-32">AVG WEIGHT<br>PER BAG</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <table class="mt-4 w-full">
                    <tr class="total-row">
                        <td class="w-16">TOTAL</td>
                        <td id="total-bags" class="w-28"></td>
                        <td id="total-weight" class="w-32"></td>
                        <td id="total-avg" class="w-32"></td>
                    </tr>
                </table>
            </div>

            <!-- Right Side -->
            <div class="right-panel">
                <div class="field-group">
                    <label class="label">Container Number:</label>
                    <input type="text" id="container" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Seal Number:</label>
                    <input type="text" id="seal" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Truck Number:</label>
                    <input type="text" id="truck" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Origin:</label>
                    <input type="text" id="origin" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">POD:</label>
                    <input type="text" id="pod" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Way Bill Number:</label>
                    <input type="text" id="waybill" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Booking Ref:</label>
                    <input type="text" id="booking" class="input-field">
                </div>
                <div class="field-group">
                    <label class="label">Moisture:</label>
                    <input type="text" id="moisture" class="input-field">
                </div>
            </div>
        </div>

        <!-- Signature -->
        <div class="signature-area">
            <label class="label">WRC SUPERVISOR NAME & SIGNATURE</label>
            <input type="text" id="supervisor-name" class="input-field" placeholder="Supervisor Full Name">
            <div class="mt-4 text-sm font-medium text-[#1e40af]">Signature:</div>
            <canvas id="signature-canvas" class="signature-canvas" width="370" height="140"></canvas>
            <div class="download-hidden flex gap-3 mt-4">
                <button onclick="clearSignature()" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white text-sm rounded">Clear</button>
                <button onclick="uploadSignature()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded">Upload</button>
            </div>
        </div>

        <div class="text-center py-8 border-t-4 border-[#1e40af] text-[#1e40af] font-semibold bg-[#f0f9ff]">
            W.R. CARPENTER TRADING SARL - CONAKRY • SHIPMENT LOADING FORM
        </div>
    </div>

    <div class="text-center mt-12">
        <button onclick="generateAndSharePNG()" class="flex items-center gap-3 bg-blue-700 hover:bg-blue-800 text-white px-14 py-6 rounded-2xl text-xl font-bold shadow-2xl">
            <i class="fas fa-image"></i> Download PNG for WhatsApp
        </button>
    </div>

    <script>
        let canvas, ctx;

        function setDate() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        }

        function generateTableRows() {
            const tbody = document.querySelector('#weighing-table tbody');
            tbody.innerHTML = '';
            for (let i = 1; i <= 16; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td><input type="number" min="0" class="bags-input input-field" data-row="${i}" oninput="calculateRow(${i}); updateTotals()"></td>
                    <td><input type="number" step="0.01" min="0" class="weight-input input-field" data-row="${i}" oninput="calculateRow(${i}); updateTotals()"></td>
                    <td><input type="text" readonly class="avg-input input-field bg-gray-50" data-row="${i}" value=""></td>
                `;
                tbody.appendChild(row);
            }
        }

        window.calculateRow = function(rowNum) {
            const bags = parseFloat(document.querySelector(`.bags-input[data-row="${rowNum}"]`).value) || 0;
            const weight = parseFloat(document.querySelector(`.weight-input[data-row="${rowNum}"]`).value) || 0;
            const avgField = document.querySelector(`.avg-input[data-row="${rowNum}"]`);
            avgField.value = (bags > 0 && weight > 0) ? (weight / bags).toFixed(2) : '';
        };

        window.updateTotals = function() {
            let totalBags = 0, totalWeight = 0;
            document.querySelectorAll('.bags-input').forEach(i => totalBags += parseFloat(i.value)||0);
            document.querySelectorAll('.weight-input').forEach(i => totalWeight += parseFloat(i.value)||0);
            const avg = totalBags > 0 ? (totalWeight / totalBags).toFixed(2) : '';
            document.getElementById('total-bags').textContent = totalBags || '';
            document.getElementById('total-weight').textContent = totalWeight ? Math.round(totalWeight) : '';
            document.getElementById('total-avg').textContent = avg;
        };

        function initSignature() {
            canvas = document.getElementById('signature-canvas');
            ctx = canvas.getContext('2d');
            ctx.lineWidth = 3; ctx.lineJoin = ctx.lineCap = 'round'; ctx.strokeStyle = '#1e40af';
            let drawing = false;
            const start = (e) => { drawing = true; draw(e); };
            const drawFn = (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', drawFn);
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mouseout', () => drawing = false);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', drawFn);
            canvas.addEventListener('touchend', () => drawing = false);
        }

        window.clearSignature = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        window.uploadSignature = () => {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };

        async function captureForm() {
            const original = document.getElementById('form-content');
            const clone = original.cloneNode(true);
            
            clone.querySelectorAll('input').forEach(input => {
                const value = input.value || '';
                const div = document.createElement('div');
                div.style.cssText = input.style.cssText + '; border: 2px solid #1e40af; padding: 14px 12px; min-height: 54px; display: flex; align-items: center; justify-content: center; font-size: 16.5px; background: white;';
                div.textContent = value;
                input.parentNode.replaceChild(div, input);
            });

            clone.style.position = 'absolute';
            clone.style.left = '-9999px';
            document.body.appendChild(clone);

            const canvasImg = await html2canvas(clone, {
                scale: 3.2,
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false
            });

            document.body.removeChild(clone);
            return canvasImg;
        }

        async function generateAndSharePNG() {
            document.querySelectorAll('.download-hidden').forEach(el => el.style.display = 'none');
            const canvasImg = await captureForm();
            const link = document.createElement('a');
            link.href = canvasImg.toDataURL('image/png');
            link.download = `WRC_Shipment_${new Date().toISOString().slice(0,10)}.png`;
            link.click();
            document.querySelectorAll('.download-hidden').forEach(el => el.style.display = 'block');
            alert("✅ PNG Downloaded Successfully!");
        }

        window.onload = () => {
            setDate();
            generateTableRows();
            initSignature();
        };
    </script>
</body>
</html>
